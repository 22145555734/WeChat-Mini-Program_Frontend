<!DOCTYPE html>
<html>
<body align="center" bgcolor="#f5f5f5">

<div style="width: 600px; margin: 30px auto; border: 1px solid #666; padding: 20px; background: white;">
  <h1 style="color:#2c3e50;">综合功能表单</h1>

  <div style="display: grid; grid-template-columns: 80px 1fr; gap: 10px; align-items: center;">
    <span>姓名：</span>
    <input>

    <span>邮箱：</span>
    <input>

    <span>密码：</span>
    <input type="password">

    <span>年龄：</span>
    <input>

    <span>生日：</span>
    <input>

    <span>性别：</span>
    <div>
      <input type="radio">男
      <input type="radio">女
    </div>

    <span>爱好：</span>
    <div>
      <input type="checkbox">阅读
      <input type="checkbox">旅游
      <input type="checkbox">烹饪
    </div>

    <span>头像：</span>
    <input type="file">
  </div>

  <br>
  <button style="background:#3498db;color:white;padding:6px 12px;border:none;">提交</button>
</div>

</body>
</html>
